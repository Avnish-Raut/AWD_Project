<div class="dashboard-container" *ngIf="user; else loading">
  <header class="dashboard-header">
    <h1>Welcome, {{ user.username }}!</h1>
    <div class="user-meta">
      <span> {{ user.email }}</span>
      <span> Role: {{ user.role }}</span>
    </div>
    <button
      style="background-color: #4f46e5; color: white; margin-top: 10px; padding: 10px"
      (click)="logout()"
    >
      Logout
    </button>
  </header>

  <main class="dashboard-content">
    <h2>Your Registered Events</h2>

    <div *ngIf="myEvents && myEvents.length > 0; else noEvents">
      <div class="event-card" *ngFor="let event of myEvents">
        <div class="event-info">
          <strong>{{ event.title }}</strong>
          <span> {{ event.location }}</span>
          <span> {{ event.event_date | date }}</span>
        </div>
        <button class="btn-cancel" (click)="cancelRegistration(event.event_id)">Cancel</button>
      </div>
      <button class="btn-browse" routerLink="/events">🔍 Find More Events</button>
    </div>

    <ng-template #noEvents>
      <p style="color: #6b7280; text-align: center; margin-top: 2rem">
        You haven't registered for any events yet.
      </p>
      <button class="btn-browse" routerLink="/events">🔍 Browse Events</button>
    </ng-template>
  </main>
</div>

<ng-template #loading>
  <div class="dashboard-container" style="text-align: center; padding: 4rem">
    <p>Fetching your profile...</p>
  </div>
</ng-template>
