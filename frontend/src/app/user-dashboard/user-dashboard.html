<div class="dashboard-container" *ngIf="user">
  <h1>Welcome, {{ user.username }}</h1>
  <p>Email: {{ user.email }}</p>
  <p>
    Role: <span class="badge">{{ user.role }}</span>
  </p>

  <hr />

  <div class="card">
    <h3>My Registered Events</h3>

    <ul *ngIf="myEvents.length > 0; else noEvents">
      <li *ngFor="let event of myEvents">
        <span> {{ event.title }} - {{ event.date }} </span>

        <button (click)="cancelRegistration(event.event_id)">Cancel</button>
      </li>
    </ul>

    <ng-template #noEvents>
      <p>You have not registered for any events.</p>
    </ng-template>
  </div>

  <div class="actions">
    <button routerLink="/events">Browse Events</button>

    <button (click)="logout()">Logout</button>
  </div>

  <p class="message" *ngIf="message">{{ message }}</p>
  <p class="error" *ngIf="error">{{ error }}</p>
</div>
