<div class="admin-container">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>Smart Events</h2>
      <div style="text-align: center; opacity: 0.8; font-size: 0.9rem; margin-top: 4px;">Admin Panel</div>
    </div>
    <nav class="sidebar-nav">
      <ul>
        <li>
          <a routerLink="/admin/dashboard" routerLinkActive="active">Dashboard</a>
        </li>
        <li>
          <a routerLink="/admin/users" routerLinkActive="active">User Management</a>
        </li>
        <li>
          <a routerLink="/admin/events" routerLinkActive="active">Events</a>
        </li>
        <li>
          <a routerLink="/admin/logs" routerLinkActive="active">System Logs</a>
        </li>
      </ul>
    </nav>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <span>Welcome, Administrator</span>
      <button class="logout-button" (click)="logout()">Logout</button>
    </header>
    <main class="content-area">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
