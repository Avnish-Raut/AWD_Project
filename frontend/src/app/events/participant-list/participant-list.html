<div class="container">
  <h2>Participant List</h2>
  <button class="btn-back" [routerLink]="['/events', eventId]">← Back to Event</button>

  <div *ngIf="loading" class="loader">Loading participants...</div>

  <div *ngIf="!loading && participants.length > 0" class="table-container">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Username</th>
          <th>Email</th>
          <th>Registration Date</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let reg of participants; let i = index">
          <td>{{ i + 1 }}</td>
          <td>{{ reg.user.username }}</td>
          <td>{{ reg.user.email }}</td>
          <td>{{ reg.registered_at | date:'short' }}</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div *ngIf="!loading && participants.length === 0" class="no-data">
    No participants have registered for this event yet.
  </div>
</div>
